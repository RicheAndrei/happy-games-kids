<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RICHE ANDREI | Find the Object</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #f9d71c; --red: #b32a2a; }
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Arial Black', sans-serif; overflow: hidden; }
        #game-container { width: 360px; height: 640px; position: relative; background: #1a1a1a; border-radius: 20px; overflow: hidden; border: 3px solid #333; }
        #start-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        #start-btn { background: var(--red); color: white; padding: 20px 40px; border-radius: 50px; font-size: 24px; border: 4px solid var(--gold); box-shadow: 0 0 20px var(--gold); animation: pulse 1.5s infinite; }
        .ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; align-items: center; }
        .header { width: 85%; background: rgba(0,0,0,0.85); border: 2.5px solid var(--gold); border-radius: 15px; margin-top: 25px; padding: 10px; display: flex; align-items: center; }
        .profile-pic { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--gold); background-image: url('../mypic.jpg.jpg'); background-size: cover; background-position: center; }
        .profile-info { margin-left: 12px; color: white; line-height: 1.2; text-align: left; }
        .profile-info h3 { margin: 0; font-size: 15px; color: var(--gold); text-transform: uppercase; }
        .instruction { width: 80%; background: var(--red); color: white; padding: 12px; border-radius: 8px; margin-top: 20px; text-align: center; border: 2px solid white; font-size: 18px; box-shadow: 0 5px 0 #000; text-transform: uppercase; }
        #object-layer { position: absolute; width: 100%; height: 100%; z-index: 5; }
        .icon { position: absolute; font-size: 38px; cursor: pointer; user-select: none; }
        .footer-engagement { position: absolute; bottom: 20px; width: 100%; text-align: center; pointer-events: none; z-index: 20; }
        .blinking-link { color: white; font-size: 15px; font-weight: bold; text-shadow: 2px 2px #000; margin-bottom: 10px; animation: soft-blink 2s linear infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes soft-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>
<div id="game-container">
    <div id="start-overlay" onclick="startGame()">
        <div id="start-btn">TAP TO START</div>
        <p style="color: white; margin-top: 20px;">Sound is ON! 🔊</p>
    </div>
    <div id="object-layer"></div>
    <div class="ui">
        <div class="header">
            <div class="profile-pic"></div>
            <div class="profile-info"><h3>RICHE ANDREI</h3><p style="margin:0; font-size:9px;">DIGITAL CREATOR | GAME DEVELOPER</p></div>
        </div>
        <div class="instruction" id="msg">FIND THE OBJECT!</div>
        <div class="footer-engagement">
            <div class="blinking-link">PLEASE FOLLOW AND SHARE! ❤️</div>
            <p style="color: var(--gold); font-size: 12px; font-weight: bold; text-shadow: 2px 2px #000; line-height: 1.3;">
                HAPPY GAMING, KIDS! THANK YOU! <br> POWERED BY RICHE ANDREI GAMES
            </p>
        </div>
    </div>
</div>
<script>
    const msg = document.getElementById('msg');
    const objectLayer = document.getElementById('object-layer');
    const startOverlay = document.getElementById('start-overlay');

    const bgMusic = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
    bgMusic.loop = true;
    bgMusic.volume = 0.2;

    const clickSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
    const winSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3');

    function startGame() { startOverlay.style.display = 'none'; bgMusic.play(); spawnLevel(); }

    const allItems = [
        { name: "BALL", icon: "⚽" }, 
        { name: "APPLE", icon: "🍎" }, 
        { name: "BURGER", icon: "🍔" }, 
        { name: "PIZZA", icon: "🍕" }, 
        { name: "CAR", icon: "🚗" }, 
        { name: "CAKE", icon: "🎂" },
        { name: "STAR", icon: "⭐" }, 
        { name: "DOG", icon: "🐶" }
    ];

    let isTransitioning = false;

    function spawnLevel() {
        objectLayer.innerHTML = '';
        isTransitioning = false;
        const targetItem = allItems[Math.floor(Math.random() * allItems.length)];
        msg.innerText = `FIND THE ${targetItem.name}!`;

        const decoPool = allItems.filter(i => i.name !== targetItem.name).map(i => i.icon);
        for (let i = 0; i < 45; i++) {
            const el = document.createElement('div');
            el.className = 'icon';
            el.innerText = decoPool[Math.floor(Math.random() * decoPool.length)];
            el.style.left = (Math.random() * 280 + 20) + 'px';
            el.style.top = (Math.random() * 380 + 130) + 'px';
            el.onclick = () => { if(!isTransitioning) { clickSound.currentTime = 0; clickSound.play(); } };
            objectLayer.appendChild(el);
        }

        const target = document.createElement('div');
        target.className = 'icon'; 
        target.innerText = targetItem.icon;
        target.style.left = (Math.random() * 280 + 20) + 'px';
        target.style.top = (Math.random() * 380 + 130) + 'px';
        target.onclick = () => {
            if (!isTransitioning) {
                isTransitioning = true;
                winSound.play();
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.7 } });
                msg.innerText = "YOU FOUND IT! 🎉";
                setTimeout(spawnLevel, 2000);
            }
        };
        objectLayer.appendChild(target);
    }
</script>
</body>
</html>
