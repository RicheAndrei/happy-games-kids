<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chess Master - Riche Andrei</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { background: #111; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }
        #game-view { width: 360px; height: 640px; position: relative; background: linear-gradient(180deg, #1e272e 0%, #000 100%); border: 4px solid #333; border-radius: 25px; display: flex; flex-direction: column; align-items: center; }
        
        .profile-header { margin-top: 35px; display: flex; align-items: center; gap: 12px; width: 85%; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 15px; border: 1px solid #fbc531; }
        .profile-pic { width: 55px; height: 55px; border-radius: 50%; border: 2px solid #fbc531; object-fit: cover; }
        .name-tag { font-size: 18px; font-weight: 900; color: #fbc531; text-transform: uppercase; margin: 0; }
        .title-tag { color: white; font-size: 10px; opacity: 0.7; }
        
        .instruction-tag { margin-top: 20px; color: white; font-weight: 800; font-size: 20px; background: #c0392b; padding: 5px 20px; border-radius: 5px; }
        .chess-board { margin-top: 20px; display: grid; grid-template-columns: repeat(8, 42px); grid-template-rows: repeat(8, 42px); border: 3px solid #fff; background: rgba(255,255,255,0.05); }
        .square { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; }
        .white-sq { background: #dcdde1; }
        .black-sq { background: #718093; }
        .w { color: #fff; text-shadow: 1px 1px #000; }
        .b { color: #000; text-shadow: 0.5px 0.5px #fff; }
        .selected { background: #fbc531 !important; border: 2px solid white; box-sizing: border-box; }
        
        #status-title { font-size: 40px; position: absolute; top: 38%; width: 100%; text-align: center; text-shadow: 3px 3px #000; transform: scale(0); transition: 0.3s; z-index: 30; font-weight: 900; pointer-events: none; }
        .msg-container { position: absolute; top: 48%; width: 88%; text-align: center; background: rgba(0,0,0,0.98); color: white; padding: 22px; border-radius: 15px; display: none; z-index: 31; font-size: 16px; line-height: 1.5; box-sizing: border-box; }
        
        .show-title { transform: scale(1.1) rotate(-3deg) !important; }
        .color-win { color: #6ab04c; border: 2px solid #6ab04c; box-shadow: 0 0 25px rgba(106, 176, 76, 0.6); }
        .color-fail { color: #eb4d4b; border: 2px solid #eb4d4b; box-shadow: 0 0 25px rgba(235, 77, 75, 0.6); }
        
        .footer { margin-top: auto; margin-bottom: 25px; text-align: center; color: white; }
        button { margin-top: 15px; padding: 14px 40px; border-radius: 50px; border: none; background: #fff; font-weight: bold; cursor: pointer; box-shadow: 0 4px #999; z-index: 40; font-size: 16px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="game-view">
        <div class="profile-header">
            <img src="profilepic.jpg" class="profile-pic" onerror="this.src='https://via.placeholder.com/55'">
            <div class="text-info">
                <div class="name-tag">Riche Andrei</div>
                <div class="title-tag">DIGITAL CREATOR | TEACHER</div>
            </div>
        </div>

        <div class="instruction-tag">WHITE TO MOVE</div>
        <div style="color: white; margin-top: 10px; font-weight: 800; font-size: 18px;">CHECKMATE IN 2</div>

        <div class="chess-board" id="board"></div>
        
        <div id="status-title"></div>

        <div id="pop-box" class="msg-container">
            <div id="pop-content"></div>
        </div>

        <button onclick="resetGame()">PLAY AGAIN 🔄</button>

        <div class="footer">
            <div style="font-size: 12px; opacity: 0.7;">Check out my page for more puzzles!</div>
        </div>
    </div>

    <script>
        const sndMove = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
        const sndFail = new Audio('https://assets.mixkit.co/active_storage/sfx/131/131-preview.mp3');
        const sndWin = new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3');

        let selectedSq = null; let moveCount = 0; let isGameOver = false;
        let blackKingPos = 'd8'; let firstMoveCorrect = false;

        const initialPieces = { 'd8': { p: '♚', c: 'b' }, 'd6': { p: '♔', c: 'w' }, 'b5': { p: '♙', c: 'w' }, 'd1': { p: '♕', c: 'w' } };

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US'; utterance.rate = 0.95;
            window.speechSynthesis.speak(utterance);
        }

        function isLegalQueenMove(from, to) {
            const fC = from.charCodeAt(0) - 96, fR = parseInt(from[1]);
            const tC = to.charCodeAt(0) - 96, tR = parseInt(to[1]);
            const dC = Math.abs(fC - tC), dR = Math.abs(fR - tR);
            return (fC === tC || fR === tR || dC === dR);
        }

        function createBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            for (let r = 8; r >= 1; r--) {
                for (let c = 1; c <= 8; c++) {
                    const id = String.fromCharCode(96 + c) + r;
                    const sq = document.createElement('div');
                    sq.className = `square ${(r + c) % 2 === 0 ? 'black-sq' : 'white-sq'}`;
                    sq.id = id;
                    if (initialPieces[id]) { sq.innerText = initialPieces[id].p; sq.classList.add(initialPieces[id].c); }
                    sq.onclick = () => handleClick(sq);
                    boardEl.appendChild(sq);
                }
            }
        }

        function handleClick(sq) {
            if (isGameOver) return;
            hideMessages();
            if (!selectedSq) {
                if (sq.classList.contains('w')) { selectedSq = sq; sq.classList.add('selected'); }
            } else {
                if (isLegalQueenMove(selectedSq.id, sq.id)) {
                    const fromId = selectedSq.id; const toId = sq.id;
                    if (moveCount === 0) {
                        firstMoveCorrect = (selectedSq.innerText === '♕' && fromId === 'd1' && toId === 'd5');
                        makeMove(selectedSq, sq); moveCount = 1; setTimeout(blackRandomResponse, 600);
                    } else if (moveCount === 1) {
                        const isWinningMove = (selectedSq.innerText === '♕' && ((blackKingPos === 'e8' && toId === 'g8') || (blackKingPos === 'c8' && toId === 'a8')));
                        makeMove(selectedSq, sq); moveCount = 2; isGameOver = true;
                        setTimeout(() => { if (firstMoveCorrect && isWinningMove) triggerWin(); else triggerFail(); }, 600);
                    }
                }
                if (selectedSq) selectedSq.classList.remove('selected'); selectedSq = null;
            }
        }

        function makeMove(f, t) { t.innerText = f.innerText; t.className = f.className; f.innerText = ''; f.className = f.className.replace(' w', '').replace(' b', '').replace(' selected', ''); sndMove.play(); }

        function blackRandomResponse() {
            const options = ['e8', 'c8']; blackKingPos = options[Math.floor(Math.random() * options.length)];
            const kingFrom = document.getElementById('d8');
            if(kingFrom) makeMove(kingFrom, document.getElementById(blackKingPos));
        }

        function triggerWin() { 
            sndWin.play(); 
            const title = document.getElementById('status-title');
            title.innerText = "GENIUS! 🎉"; title.className = "color-win show-title";
            showBox("Checkmate!", "You solved it! Please <b>Follow and Share</b> Riche Andrei's page for more chess challenges. Thanks for playing! ❤️", "color-win");
            confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } }); 
            speak("Genius! Checkmate! Please follow and share Riche Andrei's page for more chess challenges. Thanks for playing!");
        }

        function triggerFail() { 
            sndFail.play(); 
            const title = document.getElementById('status-title');
            title.innerText = "TRY AGAIN! ❌"; title.className = "color-fail show-title";
            showBox("Not Quite!", "Look for the best checkmate move! Please <b>Follow and Share</b> Riche Andrei's page for more chess challenges. Thanks for playing! ❤️", "color-fail");
            speak("Not quite! Look for the best square. Please follow and share Riche Andrei's page for more chess challenges. Thanks for playing!");
        }

        function showBox(head, body, cls) {
            const box = document.getElementById('pop-box');
            box.className = "msg-container " + cls;
            box.style.display = 'block';
            document.getElementById('pop-content').innerHTML = `<b style="font-size: 19px;">${head}</b><br><br>${body}`;
        }

        function hideMessages() {
            document.getElementById('status-title').className = "";
            document.getElementById('pop-box').style.display = 'none';
        }

        function resetGame() { 
            window.speechSynthesis.cancel();
            moveCount = 0; isGameOver = false; blackKingPos = 'd8'; firstMoveCorrect = false; 
            hideMessages(); createBoard(); 
        }
        window.onload = createBoard;
    </script>
</body>
</html>
