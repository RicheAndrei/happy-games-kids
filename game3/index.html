    <style>
        :root { --gold: #f9d71c; --red: #b32a2a; }
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Arial Black', sans-serif; overflow: hidden; }
        
        #game-container { width: 360px; height: 640px; position: relative; background: #1a1a1a; border-radius: 20px; overflow: hidden; border: 3px solid #333; }
        
        .ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; align-items: center; }
        
        .header { width: 85%; background: rgba(0,0,0,0.85); border: 2.5px solid var(--gold); border-radius: 15px; margin-top: 25px; padding: 10px; display: flex; align-items: center; animation: float 3s ease-in-out infinite; }
        .profile-pic { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--gold); background-image: url('../mypic.jpg.jpg'); background-size: cover; background-position: center; }
        .profile-info { margin-left: 12px; color: white; line-height: 1.2; text-align: left; }
        .profile-info h3 { margin: 0; font-size: 15px; color: var(--gold); text-transform: uppercase; }
        
        .instruction { width: 80%; background: var(--red); color: white; padding: 12px; border-radius: 8px; margin-top: 20px; text-align: center; border: 2px solid white; font-size: 18px; box-shadow: 0 5px 0 #000; text-transform: uppercase; animation: pulse 2s infinite; }

        #object-layer { position: absolute; width: 100%; height: 100%; z-index: 5; }
        .icon { position: absolute; font-size: 38px; user-select: none; cursor: pointer; transition: transform 0.1s; }

        .footer-engagement { position: absolute; bottom: 20px; width: 100%; text-align: center; pointer-events: none; z-index: 20; }
        /* HINAY NGA BLINKING WHITE TEXT PARA SA FACEBOOK VIEWERS */
        .blinking-link { color: white; font-size: 15px; font-weight: bold; text-shadow: 2px 2px #000; margin-bottom: 10px; animation: soft-blink 2.5s linear infinite; font-family: sans-serif; }
        .main-cta { color: var(--gold); font-size: 12px; font-weight: bold; text-shadow: 2px 2px #000; padding: 0 10px; line-height: 1.3; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        @keyframes soft-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>

            </p>
        </div>
    </div>
</div>
