<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RICHE ANDREI - MATH CATCHER</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Arial Black', sans-serif; overflow: hidden; color: white; touch-action: none; }
        
        /* 9:16 Frame para sa TikTok/Reels Style */
        #game { 
            width: 360px; height: 640px; 
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e); 
            border: 4px solid #f9d71c; position: relative; overflow: hidden; border-radius: 20px; 
        }

        #info-bar { position: absolute; top: 20px; width: 100%; padding: 10px 20px; display: flex; justify-content: space-between; background: rgba(249, 215, 28, 0.2); box-sizing: border-box; z-index: 50; border-bottom: 2px solid #f9d71c; }
        #equation { text-align: center; font-size: 32px; margin-top: 100px; font-weight: bold; color: #f9d71c; text-shadow: 3px 3px #000; position: relative; z-index: 10; }
        
        /* Basket Catcher */
        #catcher { position: absolute; bottom: 110px; width: 110px; height: 55px; background: #f9d71c; border-radius: 0 0 35px 35px; left: 125px; border: 3px solid #fff; box-shadow: 0 5px 20px rgba(249,215,28,0.5); cursor: grab; z-index: 20; }
        
        /* Falling Numbers */
        .falling { position: absolute; min-width: 65px; height: 65px; background: #fff; color: #000; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 24px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); border: 2px solid #333; z-index: 15; }

        #brand-text { position: absolute; bottom: 30px; width: 100%; text-align: center; z-index: 50; pointer-events: none; }
        #brand-text .name { font-size: 22px; color: #f9d71c; text-shadow: 2px 2px #000; display: block; }
    </style>
</head>
<body>

<div id="game">
    <div id="info-bar"><div id="score">SCORE: 0</div><div id="level">LVL: 1</div></div>
    <div id="equation">READY...</div>
    <div id="catcher"></div>
    <div id="brand-text"><span class="name">RICHE ANDREI</span><span class="action">FOLLOW FOR MORE GAMES</span></div>
</div>

<script>
    let score = 0; let level = 1; let target = 0;
    const correctSfx = new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3');
    const wrongSfx = new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3');

    const game = document.getElementById('game');
    const catcher = document.getElementById('catcher');
    const eqText = document.getElementById('equation');

    // Tingog sa Math Equation (Text-to-Speech)
    function speakEquation(text) {
        window.speechSynthesis.cancel();
        let ut = new SpeechSynthesisUtterance(text);
        ut.lang = 'en-US';
        ut.rate = 0.9;
        window.speechSynthesis.speak(ut);
    }

    // Touch/Mouse Controls para sa basket
    let isDragging = false;
    function moveCatcher(clientX) {
        let rect = game.getBoundingClientRect();
        let x = clientX - rect.left - (catcher.offsetWidth / 2);
        if (x < 0) x = 0; if (x > rect.width - catcher.offsetWidth) x = rect.width - catcher.offsetWidth;
        catcher.style.left = x + "px";
    }
    catcher.addEventListener('mousedown', () => isDragging = true);
    window.addEventListener('mousemove', (e) => { if (isDragging) moveCatcher(e.clientX); });
    window.addEventListener('mouseup', () => isDragging = false);
    catcher.addEventListener('touchstart', (e) => { isDragging = true; moveCatcher(e.touches[0].clientX); });
    window.addEventListener('touchmove', (e) => { if (isDragging) moveCatcher(e.touches[0].clientX); });
    window.addEventListener('touchend', () => isDragging = false);

    // Random Problems
    function newProblem() {
        let n1 = Math.floor(Math.random() * 9); 
        let n2 = Math.floor(Math.random() * 9); 
        target = n1 + n2; 
        eqText.innerText = n1 + " + " + n2 + " = ?";
        speakEquation(n1 + " plus " + n2);
    }

    // Paghimo sa falling numbers
    function createFalling() {
        let div = document.createElement('div');
        div.className = 'falling';
        let val = Math.random() > 0.4 ? target : target + (Math.floor(Math.random() * 5) + 1);
        div.innerText = val;
        div.style.left = Math.floor(Math.random() * (360 - 70)) + "px";
        div.style.top = "0px";
        game.appendChild(div);

        let fallTimer = setInterval(() => {
            let top = parseInt(div.style.top);
            div.style.top = (top + 4) + "px"; 
            if(top > 470 && top < 530) {
                let divLeft = parseInt(div.style.left);
                let cLeft = parseInt(catcher.style.left || 125);
                if(divLeft > cLeft - 30 && divLeft < cLeft + 90) {
                    if(div.innerText == target) {
                        score += 1; correctSfx.play();
                        confetti({ particleCount: 30, origin: { y: 0.82 } });
                        newProblem();
                    } else { score = Math.max(0, score - 1); wrongSfx.play(); }
                    document.getElementById('score').innerText = "SCORE: " + score;
                    clearInterval(fallTimer); div.remove();
                }
            }
            if(top > 650) { clearInterval(fallTimer); div.remove(); }
        }, 30);
    }

    newProblem();
    setInterval(createFalling, 2500);
</script>
</body>
</html>
