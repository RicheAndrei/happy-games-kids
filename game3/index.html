<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RICHE ANDREI - MATH CATCHER PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Arial Black', sans-serif; overflow: hidden; color: white; touch-action: none; }
        
        #game { 
            width: 360px; 
            height: 640px; 
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e); 
            border: 4px solid #f9d71c; 
            position: relative; 
            overflow: hidden; 
            border-radius: 20px; 
        }

        /* PROMO TEXT SA TUNGA (BACKGROUND) */
        #promo-bg {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            text-align: center;
            z-index: 1;
            pointer-events: none;
            opacity: 0.15; 
        }
        #promo-bg h2 { margin: 0; font-size: 30px; color: #f9d71c; letter-spacing: 2px; }
        #promo-bg p { margin: 5px 0; font-size: 14px; letter-spacing: 1px; color: #fff; }
        
        #info-bar { 
            position: absolute; 
            top: 20px; 
            width: 100%; 
            padding: 10px 20px; 
            display: flex; 
            justify-content: space-between; 
            background: rgba(249, 215, 28, 0.2); 
            box-sizing: border-box; 
            z-index: 50; 
            border-bottom: 2px solid #f9d71c;
        }
        
        #equation { 
            text-align: center; 
            font-size: 30px; 
            margin-top: 100px; 
            font-weight: bold; 
            color: #f9d71c; 
            text-shadow: 3px 3px #000; 
            position: relative;
            z-index: 10;
        }

        /* BRAND TEXT SA UBOS */
        #brand-text {
            position: absolute;
            bottom: 30px; 
            width: 100%;
            text-align: center;
            z-index: 50;
            pointer-events: none;
        }
        #brand-text .name { font-size: 20px; color: #f9d71c; text-shadow: 2px 2px #000; display: block; }
        #brand-text .action { font-size: 11px; color: #fff; opacity: 0.8; letter-spacing: 1px; font-family: sans-serif; font-weight: bold; }
        
        #catcher { 
            position: absolute; 
            bottom: 110px; 
            width: 110px; 
            height: 55px; 
            background: #f9d71c; 
            border-radius: 0 0 35px 35px; 
            left: 125px; 
            border: 3px solid #fff; 
            box-shadow: 0 5px 20px rgba(249,215,28,0.5); 
            cursor: grab; 
            z-index: 20; 
        }
        
        .falling { 
            position: absolute; 
            min-width: 60px; 
            height: 60px; 
            background: #fff; 
            color: #000; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-weight: bold; 
            font-size: 22px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.5); 
            border: 2px solid #333; 
            z-index: 15;
        }

        #pop-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 240px;
            font-size: 50px;
            color: #f9d71c;
            display: none;
            z-index: 100;
            text-shadow: 4px 4px #000;
        }
        
        #lvl-msg { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            font-size: 35px; 
            color: #f9d71c; 
            font-weight: bold; 
            display: none; 
            z-index: 200; 
            text-align: center; 
            background: rgba(0,0,0,0.95); 
            width: 100%; 
            padding: 30px; 
            border-top: 5px solid #f9d71c; 
            border-bottom: 5px solid #f9d71c; 
        }
    </style>
</head>
<body>

</div>
