<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RICHE & ANDREI | Games</title>
    <style>
        body { margin: 0; background: #2a2e31; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Arial Black', sans-serif; color: white; overflow: hidden; }
        .container { background: #222529; border: 3px solid #f9d71c; border-radius: 35px; padding: 40px; width: 320px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .header { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 30px; }
        .header h1 { font-size: 20px; color: #f9d71c; margin: 0; font-weight: 900; letter-spacing: 1px; }
        .btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 14px 0; margin-bottom: 15px; border-radius: 12px; border: none; color: white; font-weight: bold; font-size: 16px; cursor: pointer; text-decoration: none; gap: 10px; transition: 0.2s ease; }
        
        .btn-find { background: linear-gradient(to right, #ff4d6d, #ff8533); }
        .btn-math { background: linear-gradient(to right, #f9d71c, #ff8533); color: #000; }
        .btn-spell { background: linear-gradient(to right, #f9d71c, #ff4d6d); }

        .btn:hover { transform: scale(1.03); }
        .footer { color: #6c757d; font-size: 10px; margin-top: 25px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <span>🎮</span>
            <h1>RICHE & ANDREI</h1>
            <span>🎮</span>
        </div>

        <a href="game1/index.html" class="btn btn-find">🔍 Find the Object</a>
        <a href="game2/index.html" class="btn btn-math">🎡 Math Wheel Challenge</a>
        <a href="game4/index.html" class="btn btn-spell">✍️ Spell the Object</a>

        <div class="footer">
            POWERED BY RICHE ANDREI GAMES
        </div>
    </div>

</body>
</html>
