<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riche & Andrei Games</title>
    <style>
        /* DESIGN PARA DILI MAG-BINOGO ANG HITSURA */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
        }
        h1 { color: #333; margin-bottom: 20px; }
        .btn-container { display: flex; flex-direction: column; gap: 15px; }
        .btn {
            display: block;
            padding: 20px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            border-radius: 12px;
            transition: 0.2s;
        }
        /* SAKTONG LINKS BASE SA IMONG GITHUB FOLDERS */
        .btn-red { background-color: #ff4757; }
        .btn-blue { background-color: #3498db; }
        .btn:hover { opacity: 0.9; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="container">
    <h1>🎮 Riche & Andrei 🎮</h1>
    <div class="btn-container">
        <a href="game1/index.html" class="btn btn-red">🔍 Guess the Icon</a>
        
        <a href="game2/index.html" class="btn btn-blue">💡 Logic Trap</a>
    </div>
    <p style="margin-top: 20px; color: #888;">Enjoy playing!</p>
</div>

</body>
</html>
