<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riche & Andrei Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
        }

        h1 { color: #2c3e50; font-size: 2rem; margin-bottom: 5px; }
        .subtitle { color: #7f8c8d; margin-bottom: 30px; }

        /* Grid Layout para sa Maraming Laro */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .game-card {
            background: #ffffff;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .game-card:hover {
            border-color: #3498db;
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.2);
        }

        .icon { font-size: 40px; }
        .game-title { font-weight: 700; font-size: 1rem; }

        /* Colors per card */
        .card-red { border-bottom: 5px solid #ff4757; }
        .card-blue { border-bottom: 5px solid #3498db; }
        .card-green { border-bottom: 5px solid #2ed573; }
        .card-purple { border-bottom: 5px solid #9b59b6; }

        .footer { color: #bdc3c7; font-size: 0.9rem; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎮 Riche & Andrei Games 🎮</h1>
    <p class="subtitle">Pili og dula sa ubos:</p>

    <div class="game-grid">
        <a href="#" class="game-card card-red">
            <span class="icon">🔍</span>
            <span class="game-title">Guess the Icon</span>
        </a>

        <a href="#" class="game-card card-blue">
            <span class="icon">💡</span>
            <span class="game-title">Logic Trap</span>
        </a>

        <a href="#" class="game-card card-green">
            <span class="icon">♟️</span>
            <span class="game-title">Chess Puzzles</span>
        </a>

        <a href="#" class="game-card card-purple">
            <span class="icon">🧱</span>
            <span class="game-title">Roblox Fun</span>
        </a>
    </div>

    <p class="footer">Enjoy playing, kids!</p>
</div>

</body>
</html>
