<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riche & Andrei Games</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #f0f2f5; 
            font-family: sans-serif; 
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            text-align: center; 
            width: 320px; 
        }
        h1 { color: #333; margin-bottom: 30px; font-size: 24px; }
        .button { 
            display: block; 
            width: 100%; 
            padding: 15px 0; 
            margin: 15px 0; 
            border-radius: 12px; 
            color: white; 
            font-size: 18px; 
            font-weight: bold; 
            text-decoration: none; 
            transition: 0.2s; 
            border: none;
            cursor: pointer;
        }
        .button:active { transform: scale(0.95); }
        .red { background-color: #ff4757; }
        .blue { background-color: #3498db; }
        .green { background-color: #2ed573; }
        .footer { margin-top: 20px; font-size: 14px; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎮 Riche & Andrei 🎮</h1>
    
    <a href="game4/index.html" class="button red">🔍 Guess the Icon</a>
    
    <a href="game3/index.html" class="button blue">💡 Logic Trap</a>
    <a href="game2/index.html" class="button green">🎯 Hidden Object</a>
    
    <div class="footer">Enjoy playing!</div>
</div>

</body>
</html>
