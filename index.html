<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RICHE ANDREI GAMES - MAIN MENU</title>
    <style>
        body { margin: 0; background: #000; color: #f9d71c; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }

        .menu-container { display: flex; flex-direction: column; gap: 15px; width: 300px; }

            border-radius: 20px; transition: 0.3s; box-shadow: 0 0 20px rgba(249, 215, 28, 0.3);

        .game-btn:hover { transform: scale(1.05); background: #fff; box-shadow: 0 0 30px rgba(249, 215, 28, 0.6); }
        .footer { position: absolute; bottom: 25px; text-align: center; width: 100%; font-size: 12px; color: #fff; opacity: 0.8; line-height: 1.5; }

</head>

    <div class="header">
