<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riche & Andrei Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
        }

        h1 {
            color: #2c3e50;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            color: white;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-red { background-color: #ff4757; }
        .btn-blue { background-color: #3498db; }

        .footer {
            margin-top: 30px;
            font-style: italic;
            color: #95a5a6;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎮 Riche & Andrei Games 🎮</h1>
    <p class="subtitle">Pili og dula sa ubos:</p>

    <div class="button-stack">
        <a href="#" class="btn btn-red">Dula 1: Guess the Icon</a>
        <a href="#" class="btn btn-blue">Dula 2: Logic Trap</a>
    </div>

    <p class="footer">Enjoy playing, kids!</p>
</div>

</body>
</html>
