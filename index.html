<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RICHE ANDREI | Games</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: linear-gradient(135deg, #1a1a1a 0%, #2d3436 100%); 
            font-family: 'Segoe UI', sans-serif; 
        }
        .container { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 40px; 
            border-radius: 30px; 
            border: 2px solid #f9d71c;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
            text-align: center; 
            width: 320px; 
        }
        h1 { color: #f9d71c; margin-bottom: 30px; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        .button { 
            display: block; 
            width: 100%; 
            padding: 15px 0; 
            margin: 15px 0; 
            border-radius: 12px; 
            color: white; 
            font-size: 18px; 
            font-weight: bold; 
            text-decoration: none; 
            transition: 0.3s; 
            border: none;
            cursor: pointer;
        }
        .button:active { transform: scale(0.95); }
        .red { background: linear-gradient(to right, #ff416c, #ff4b2b); box-shadow: 0 4px 15px rgba(255, 75, 43, 0.3); }
        .gold { background: linear-gradient(to right, #f9d423, #ff4e50); color: #000; box-shadow: 0 4px 15px rgba(249, 212, 35, 0.3); }
        .footer { margin-top: 20px; font-size: 12px; color: #888; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎮 RICHE & ANDREI 🎮</h1>
    
    <a href="game1/index.html" class="button red">🔍 Find the Object</a>
    
    <a href="game4/index.html" class="button gold">✍️ Spell the Object</a>
    
    <div class="footer">Powered by Riche Andrei Games</div>
</div>

</body>
</html>
