<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RICHE ANDREI | Perfect Sound Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #f9d71c; --blue: #3498db; --red: #ff4757; }
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Arial Black', sans-serif; overflow: hidden; color: white; }
        #overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        #start-btn { padding: 25px 80px; font-size: 26px; background: var(--gold); border: none; border-radius: 60px; cursor: pointer; font-weight: bold; color: black; box-shadow: 0 0 40px rgba(249, 215, 28, 0.8); }
        #game-container { width: 340px; height: 630px; background: #1a1a1a; border-radius: 20px; border: 3.5px solid var(--gold); display: flex; flex-direction: column; align-items: center; padding: 10px; }
        .title-banner { background: var(--gold); color: black; padding: 4px 15px; border-radius: 8px; font-size: 16px; margin-top: 5px; text-transform: uppercase; }
        #timer-wrapper { width: 90%; height: 8px; background: #333; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: var(--red); transition: width 0.1s linear; }
        #middle-section { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding: 0 5px; }
        .side-text { width: 75px; font-size: 11px; color: var(--gold); text-align: center; font-weight: bold; }
        #wheel-wrapper { position: relative; width: 155px; height: 155px; }
        #wheel-svg { width: 100%; height: 100%; transform: rotate(-90deg); transition: transform 4s cubic-bezier(0.1, 0.7, 0.1, 1); }
        #pointer { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); font-size: 30px; z-index: 100; color: var(--red); }
        #spin-btn { margin-top: 10px; padding: 10px 45px; background: var(--gold); color: black; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 18px; box-shadow: 0 4px 0 #997a00; }
        #display-box { margin-top: 15px; width: 92%; height: 85px; background: #222; border-radius: 15px; border: 2.5px solid var(--blue); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #target-emoji { font-size: 38px; }
        #word-display { font-size: 22px; letter-spacing: 5px; color: var(--gold); font-weight: bold; }
        #keyboard { margin-top: 10px; width: 100%; display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .key { background: #333; border: 1px solid #555; border-radius: 5px; padding: 12px 0; text-align: center; cursor: pointer; font-size: 14px; font-weight: bold; color: white; }
        .key:active { background: var(--gold); color: black; }
        #message { margin-top: 5px; font-size: 16px; font-weight: bold; height: 18px; }
    </style>
</head>
<body>

<div id="overlay" onclick="startGame()">
    <h1 style="color: var(--gold); margin-bottom: 10px;">RICHE ANDREI TV</h1>
    <button id="start-btn">START GAME</button>
</div>

<div id="game-container">
    <div class="title-banner">SPELL THE PICTURE</div>
    <div id="timer-wrapper"><div id="timer-bar"></div></div>
    <div id="middle-section">
        <div class="side-text">RICHE<br>ANDREI</div>
        <div id="wheel-wrapper">
            <div id="pointer">▼</div>
            <svg id="wheel-svg" viewBox="0 0 100 100"></svg>
        </div>
        <div class="side-text" style="color:#fff; font-size:9px;">WANT PLAY?<br>LINK ON<br>COMMENT! 🎮</div>
    </div>
    <button id="spin-btn" onclick="spin()">SPIN!</button>
    <div id="display-box">
        <div id="target-emoji">❓</div>
        <div id="word-display">READY?</div>
    </div>
    <div id="message"></div>
    <div id="keyboard"></div>
</div>

<script>
    let audioCtx = null;
    let spinning = false; let rotation = 0; let selected = null; let input = "";
    let timerInterval = null;

    function startGame() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('overlay').style.display = 'none';
        makeSound(800, 'sine', 0.2, 0.2); 
    }

    // GENERAL SOUND FUNCTION
    function makeSound(freq, type, duration, vol) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    const items = [
        {e:"🍎", w:"APPLE", c:"#e74c3c"}, {e:"🚗", w:"CAR", c:"#3498db"},
        {e:"🐶", w:"DOG", c:"#f39c12"}, {e:"🏠", w:"HOME", c:"#2ecc71"},
        {e:"⚽", w:"BALL", c:"#95a5a6"}, {e:"🍌", w:"BANANA", c:"#f1c40f"},
        {e:"🐟", w:"FISH", c:"#1abc9c"}, {e:"☀️", w:"SUN", c:"#e67e22"}
    ];

    const svg = document.getElementById('wheel-svg');
    items.forEach((item, i) => {
        const start = i * 45; const end = (i + 1) * 45;
        const x1 = 50 + 50 * Math.cos(Math.PI * start / 180);
        const y1 = 50 + 50 * Math.sin(Math.PI * start / 180);
        const x2 = 50 + 50 * Math.cos(Math.PI * end / 180);
        const y2 = 50 + 50 * Math.sin(Math.PI * end / 180);
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", `M 50 50 L ${x1} ${y1} A 50 50 0 0 1 ${x2} ${y2} Z`);
        path.setAttribute("fill", item.c); path.setAttribute("stroke", "white"); svg.appendChild(path);
        const angle = start + 22.5;
        const tx = 50 + 32 * Math.cos(Math.PI * angle / 180);
        const ty = 50 + 32 * Math.sin(Math.PI * angle / 180);
        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        text.setAttribute("x", tx); text.setAttribute("y", ty); text.setAttribute("font-size", "8");
        text.setAttribute("text-anchor", "middle"); text.setAttribute("alignment-baseline", "middle");
        text.setAttribute("transform", `rotate(${angle + 90}, ${tx}, ${ty})`);
        text.setAttribute("fill", "white"); text.textContent = item.e; svg.appendChild(text);
    });

    function spin() {
        if (spinning) return; 
        spinning = true; input = "";
        clearInterval(timerInterval);
        document.getElementById('timer-bar').style.width = "100%";
        document.getElementById('message').innerText = "";

        // SPIN SFX
        let spinSfxInterval = setInterval(() => {
            if (!spinning) clearInterval(spinSfxInterval);
            makeSound(500, 'square', 0.05, 0.1); 
        }, 130);

        const rand = Math.floor(Math.random() * 8);
        rotation += (3600 - (rotation % 360) + (360 - (rand * 45 + 22.5)));
        document.getElementById('wheel-svg').style.transform = `rotate(${rotation - 90}deg)`;

        setTimeout(() => {
            spinning = false;
            clearInterval(spinSfxInterval);
            makeSound(900, 'sine', 0.3, 0.3); // Stop sound
            selected = items[rand]; 
            document.getElementById('target-emoji').innerText = selected.e;
            update(); startTimer();
        }, 4000);
    }

    function startTimer() {
        let timeLeft = 100;
        timerInterval = setInterval(() => {
            timeLeft -= 1; document.getElementById('timer-bar').style.width = timeLeft + "%";
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                makeSound(200, 'sawtooth', 0.5, 0.3);
                document.getElementById('message').innerText = "TIME'S UP! ⏰";
                selected = null;
            }
        }, 100);
    }

    function update() {
        let s = ""; for(let i=0; i<selected.w.length; i++) s += (input[i] || "_") + " ";
        document.getElementById('word-display').innerText = s;
    }

    function type(c) {
        if (!selected || spinning) return; 
        makeSound(1000, 'sine', 0.1, 0.2); // Keyboard Click
        if (c === selected.w[input.length]) {
            input += c; update();
            if (input === selected.w) {
                clearInterval(timerInterval);
                makeSound(1300, 'sine', 0.8, 0.4); // Win
                document.getElementById('message').innerText = "CORRECT! 🎉";
                confetti({particleCount: 150, spread: 70, origin: {y: 0.6}}); 
                selected = null;
            }
        } else {
            makeSound(250, 'sawtooth', 0.2, 0.3); // Wrong
            document.getElementById('message').innerText = "TRY AGAIN! ❌";
            setTimeout(() => { if(selected) document.getElementById('message').innerText = ""; }, 1000);
        }
    }

    const kb = document.getElementById('keyboard');
    "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(c => {
        let d = document.createElement('div'); d.className = 'key'; d.innerText = c;
        d.onclick = () => type(c); kb.appendChild(d);
    });
</script>
</body>
</html>
